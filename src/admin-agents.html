<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>
      Gestion Agents | TailAdmin - Tailwind CSS Admin Dashboard Template
    </title>
  </head>
  <body
    x-data="{ page: 'adminAgents', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <!-- ===== Preloader Start ===== -->
    <include src="./partials/preloader.html"></include>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
      <!-- ===== Sidebar Start ===== -->
      <include src="./partials/sidebar.html"></include>
      <!-- ===== Sidebar End ===== -->

      <!-- ===== Content Area Start ===== -->
      <div
        class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto"
      >
        <!-- Small Device Overlay Start -->
        <include src="./partials/overlay.html" />
        <!-- Small Device Overlay End -->

        <!-- ===== Header Start ===== -->
        <include src="./partials/header.html" />
        <!-- ===== Header End ===== -->

        <!-- ===== Main Content Start ===== -->
        <main>
          <div class="pt-16 p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6">
            <!-- Breadcrumb Start -->
            <div x-data="{ pageName: `Gestion Agents`}">
              <include src="./partials/breadcrumb.html" />
            </div>
            <!-- Breadcrumb End -->

            <div class="space-y-5 sm:space-y-6">
              <div
                class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="px-5 py-4 sm:px-6 sm:py-5">
                  <h3
                    class="text-base font-medium text-gray-800 dark:text-white/90"
                  >
                    Liste des Agents
                  </h3>
                </div>
                <div
                  class="p-5 border-t border-gray-100 dark:border-gray-800 sm:p-6"
                >
                  <!-- ====== Agents Table Start -->
                  <div
                    class="overflow-hidden rounded-xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]"
                  >
                    <div class="max-w-full overflow-x-auto">
                      <table class="min-w-full">
                        <!-- table header start -->
                        <thead>
                          <tr class="border-b border-gray-100 dark:border-gray-800">
                            <th class="px-5 py-3 sm:px-6">
                              <div class="flex items-center">
                                <p
                                  class="font-medium text-gray-500 text-theme-xs dark:text-gray-400"
                                >
                                  Nom
                                </p>
                              </div>
                            </th>
                            <th class="px-5 py-3 sm:px-6">
                              <div class="flex items-center">
                                <p
                                  class="font-medium text-gray-500 text-theme-xs dark:text-gray-400"
                                >
                                  Prénom
                                </p>
                              </div>
                            </th>
                            <th class="px-5 py-3 sm:px-6">
                              <div class="flex items-center">
                                <p
                                  class="font-medium text-gray-500 text-theme-xs dark:text-gray-400"
                                >
                                  Email
                                </p>
                              </div>
                            </th>
                            <th class="px-5 py-3 sm:px-6">
                              <div class="flex items-center">
                                <p
                                  class="font-medium text-gray-500 text-theme-xs dark:text-gray-400"
                                >
                                  Statut
                                </p>
                              </div>
                            </th>
                            <th class="px-5 py-3 sm:px-6">
                              <div class="flex items-center">
                                <p
                                  class="font-medium text-gray-500 text-theme-xs dark:text-gray-400"
                                >
                                  Date Création
                                </p>
                              </div>
                            </th>
                            <th class="px-5 py-3 sm:px-6">
                              <div class="flex items-center">
                                <p
                                  class="font-medium text-gray-500 text-theme-xs dark:text-gray-400"
                                >
                                  Actions
                                </p>
                              </div>
                            </th>
                          </tr>
                        </thead>
                        <!-- table header end -->
                        <!-- table body start -->
                        <tbody id="agentsTableBody" class="divide-y divide-gray-100 dark:divide-gray-800">
                          <!-- Agents will be loaded here -->
                        </tbody>
                      </table>
                    </div>
                  </div>
                  <!-- ====== Agents Table End -->
                </div>
              </div>
            </div>
          </div>
        </main>
        <!-- ===== Main Content End ===== -->
      </div>
      <!-- ===== Content Area End ===== -->
    </div>
    <!-- ===== Page Wrapper End ===== -->

    <!-- Modal for delete confirmation -->
    <div id="deleteModal" class="fixed inset-0 z-50 hidden overflow-y-auto overflow-x-hidden bg-gray-900/50">
      <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
        <div class="inline-block w-full max-w-md p-6 my-8 overflow-hidden text-left align-middle transition-all transform bg-white shadow-xl rounded-2xl dark:bg-gray-800">
          <div class="sm:flex sm:items-start">
            <div class="flex items-center justify-center flex-shrink-0 w-12 h-12 mx-auto bg-red-100 rounded-full sm:mx-0 sm:h-10 sm:w-10 dark:bg-red-500/20">
              <svg class="w-6 h-6 text-red-600 dark:text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z" />
              </svg>
            </div>
            <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left">
              <h3 class="text-lg font-medium leading-6 text-gray-900 dark:text-white" id="modalTitle">
                Supprimer l'agent
              </h3>
              <div class="mt-2">
                <p class="text-sm text-gray-500 dark:text-gray-400" id="modalMessage">
                  Êtes-vous sûr de vouloir supprimer cet agent ? Cette action est irréversible.
                </p>
              </div>
            </div>
          </div>
          <div class="mt-5 sm:mt-4 sm:flex sm:flex-row-reverse">
            <button
              type="button"
              id="confirmDeleteBtn"
              class="inline-flex justify-center w-full px-3 py-2 text-sm font-medium text-white bg-red-600 border border-transparent rounded-md shadow-sm hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 sm:ml-3 sm:w-auto sm:text-sm"
            >
              Supprimer
            </button>
            <button
              type="button"
              id="cancelDeleteBtn"
              class="inline-flex justify-center w-full px-3 py-2 mt-3 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600 dark:hover:bg-gray-600"
            >
              Annuler
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
      import { app } from "./firebaseConfig.js";

      const db = getFirestore(app);
      let agents = [];
      let agentToDelete = null;

      async function loadAgents() {
        const querySnapshot = await getDocs(collection(db, "agents"));
        agents = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderAgents();
      }

      function renderAgents() {
        const tbody = document.getElementById('agentsTableBody');
        tbody.innerHTML = agents.map(agent => `
          <tr>
            <td class="px-5 py-4 sm:px-6">
              <div class="flex items-center">
                <p class="text-gray-500 text-theme-sm dark:text-gray-400">${agent.nom}</p>
              </div>
            </td>
            <td class="px-5 py-4 sm:px-6">
              <div class="flex items-center">
                <p class="text-gray-500 text-theme-sm dark:text-gray-400">${agent.prenom}</p>
              </div>
            </td>
            <td class="px-5 py-4 sm:px-6">
              <div class="flex items-center">
                <p class="text-gray-500 text-theme-sm dark:text-gray-400">${agent.email}</p>
              </div>
            </td>
            <td class="px-5 py-4 sm:px-6">
              <div class="flex items-center">
                <p class="rounded-full ${agent.status === 'active' ? 'bg-success-50 text-success-700 dark:bg-success-500/15 dark:text-success-500' : 'bg-warning-50 text-warning-700 dark:bg-warning-500/15 dark:text-warning-400'} px-2 py-0.5 text-theme-xs font-medium">
                  ${agent.status === 'active' ? 'Actif' : 'Inactif'}
                </p>
              </div>
            </td>
            <td class="px-5 py-4 sm:px-6">
              <div class="flex items-center">
                <p class="text-gray-500 text-theme-sm dark:text-gray-400">${new Date(agent.createdAt.seconds * 1000).toLocaleDateString()}</p>
              </div>
            </td>
            <td class="px-5 py-4 sm:px-6">
              <div class="flex items-center gap-2">
                <button onclick="toggleStatus('${agent.id}', '${agent.status}')" class="inline-flex items-center justify-center gap-2 rounded-lg transition px-4 py-3.5 text-sm bg-brand-500 text-white shadow-theme-xs hover:bg-brand-600 disabled:bg-brand-300">
                  ${agent.status === 'active' ? 'Désactiver' : 'Activer'}
                </button>
                <button onclick="confirmDelete('${agent.id}', '${agent.nom} ${agent.prenom}')" class="inline-flex items-center justify-center gap-2 rounded-lg transition px-4 py-3.5 text-sm bg-red-500 text-white shadow-theme-xs hover:bg-red-600 disabled:bg-red-300">
                  Supprimer
                </button>
              </div>
            </td>
          </tr>
        `).join('');
      }

      window.toggleStatus = async function(agentId, currentStatus) {
        const newStatus = currentStatus === 'active' ? 'inactive' : 'active';
        await updateDoc(doc(db, "agents", agentId), { status: newStatus });
        loadAgents();
      };

      window.confirmDelete = function(agentId, name) {
        agentToDelete = agentId;
        document.getElementById('modalTitle').textContent = 'Supprimer l\'agent';
        document.getElementById('modalMessage').textContent = `Êtes-vous sûr de vouloir supprimer l'agent ${name} ? Cette action est irréversible.`;
        document.getElementById('deleteModal').classList.remove('hidden');
      };

      document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
        if (agentToDelete) {
          await deleteDoc(doc(db, "agents", agentToDelete));
          loadAgents();
          document.getElementById('deleteModal').classList.add('hidden');
          agentToDelete = null;
        }
      });

      document.getElementById('cancelDeleteBtn').addEventListener('click', () => {
        document.getElementById('deleteModal').classList.add('hidden');
        agentToDelete = null;
      });

      loadAgents();
    </script>
  </body>
</html>
