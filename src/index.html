<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>
      CRM Dashboard | TailAdmin - Tailwind CSS Admin Dashboard Template
    </title>
    <link rel="manifest" href="manifest.json">
  </head>
  <body
    x-data="{ page: 'ecommerce', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <!-- ===== Preloader Start ===== -->
    <include src="./partials/preloader.html"></include>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
      <!-- ===== Sidebar Start ===== -->
      <include src="./partials/sidebar.html"></include>
      <!-- ===== Sidebar End ===== -->

      <!-- ===== Content Area Start ===== -->
      <div
        class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto"
      >
        <!-- Small Device Overlay Start -->
        <include src="./partials/overlay.html" />
        <!-- Small Device Overlay End -->

        <!-- ===== Header Start ===== -->
        <include src="./partials/header.html" />
        <!-- ===== Header End ===== -->

        <!-- ===== Main Content Start ===== -->
        <main>
          <div class="pt-16 p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6">
            <!-- Breadcrumb Start -->
            <div x-data="{ pageName: `CRM Dashboard`}">
              <include src="./partials/breadcrumb.html" />
            </div>
            <!-- Breadcrumb End -->

            <div class="grid grid-cols-12 gap-4 md:gap-6">
              <div class="col-span-12 space-y-6 xl:col-span-7">
                <!-- CRM Metrics -->
                <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 md:grid-cols-4">
                  <div class="rounded-2xl border border-gray-200 bg-white p-6 shadow-default dark:border-gray-800 dark:bg-gray-900">
                    <div class="flex items-center justify-between">
                      <div>
                        <span class="text-sm font-medium text-gray-600 dark:text-gray-400">Total Agents</span>
                        <h4 class="text-title-sm font-bold text-gray-800 dark:text-white/90" id="totalAgents">0</h4>
                      </div>
                      <div class="flex h-11.5 w-11.5 items-center justify-center rounded-full bg-gray-100 dark:bg-gray-800">
                        <svg class="fill-current text-gray-600 dark:text-gray-400" width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                          <path d="M10 9.99998C12.3012 9.99998 14.1667 8.13445 14.1667 5.83331C14.1667 3.53217 12.3012 1.66665 10 1.66665C7.69886 1.66665 5.83335 3.53217 5.83335 5.83331C5.83335 8.13445 7.69886 9.99998 10 9.99998Z" />
                          <path d="M10 11.6666C6.31812 11.6666 3.33335 14.6514 3.33335 18.3333C3.33335 18.7935 3.70645 19.1666 4.16669 19.1666H15.8334C16.2936 19.1666 16.6667 18.7935 16.6667 18.3333C16.6667 14.6514 13.6819 11.6666 10 11.6666Z" />
                        </svg>
                      </div>
                    </div>
                  </div>
                  <div class="rounded-2xl border border-gray-200 bg-white p-6 shadow-default dark:border-gray-800 dark:bg-gray-900">
                    <div class="flex items-center justify-between">
                      <div>
                        <span class="text-sm font-medium text-gray-600 dark:text-gray-400">Total Prospects</span>
                        <h4 class="text-title-sm font-bold text-gray-800 dark:text-white/90" id="totalProspects">0</h4>
                      </div>
                      <div class="flex h-11.5 w-11.5 items-center justify-center rounded-full bg-gray-100 dark:bg-gray-800">
                        <svg class="fill-current text-gray-600 dark:text-gray-400" width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                          <path d="M15.8333 5.83331H4.16667C3.70643 5.83331 3.33333 6.20641 3.33333 6.66665V15.8333C3.33333 16.2935 3.70643 16.6666 4.16667 16.6666H15.8333C16.2935 16.6666 16.6667 16.2935 16.6667 15.8333V6.66665C16.6667 6.20641 16.2935 5.83331 15.8333 5.83331Z" />
                          <path d="M6.66667 3.33331V5.83331" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
                          <path d="M13.3333 3.33331V5.83331" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
                          <path d="M3.33333 9.16665H16.6667" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
                          <path d="M3.33333 12.5H16.6667" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                      </div>
                    </div>
                  </div>
                  <div class="rounded-2xl border border-gray-200 bg-white p-6 shadow-default dark:border-gray-800 dark:bg-gray-900">
                    <div class="flex items-center justify-between">
                      <div>
                        <span class="text-sm font-medium text-gray-600 dark:text-gray-400">Total Clients</span>
                        <h4 class="text-title-sm font-bold text-gray-800 dark:text-white/90" id="totalClients">0</h4>
                      </div>
                      <div class="flex h-11.5 w-11.5 items-center justify-center rounded-full bg-gray-100 dark:bg-gray-800">
                        <svg class="fill-current text-green-600 dark:text-green-400" width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                          <path d="M10 9.99998C12.3012 9.99998 14.1667 8.13445 14.1667 5.83331C14.1667 3.53217 12.3012 1.66665 10 1.66665C7.69886 1.66665 5.83335 3.53217 5.83335 5.83331C5.83335 8.13445 7.69886 9.99998 10 9.99998Z" />
                          <path d="M10 11.6666C6.31812 11.6666 3.33335 14.6514 3.33335 18.3333C3.33335 18.7935 3.70645 19.1666 4.16669 19.1666H15.8334C16.2936 19.1666 16.6667 18.7935 16.6667 18.3333C16.6667 14.6514 13.6819 11.6666 10 11.6666Z" />
                        </svg>
                      </div>
                    </div>
                  </div>
                  <div class="rounded-2xl border border-gray-200 bg-white p-6 shadow-default dark:border-gray-800 dark:bg-gray-900">
                    <div class="flex items-center justify-between">
                      <div>
                        <span class="text-sm font-medium text-gray-600 dark:text-gray-400">Total Ventes</span>
                        <h4 class="text-title-sm font-bold text-gray-800 dark:text-white/90" id="totalSales">0</h4>
                      </div>
                      <div class="flex h-11.5 w-11.5 items-center justify-center rounded-full bg-gray-100 dark:bg-gray-800">
                        <svg class="fill-current text-blue-600 dark:text-blue-400" width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                          <path d="M15.8333 5.83331H4.16667C3.70643 5.83331 3.33333 6.20641 3.33333 6.66665V15.8333C3.33333 16.2935 3.70643 16.6666 4.16667 16.6666H15.8333C16.2935 16.6666 16.6667 16.2935 16.6667 15.8333V6.66665C16.6667 6.20641 16.2935 5.83331 15.8333 5.83331Z" />
                          <path d="M13.3333 3.33331H6.66667C5.74619 3.33331 5 4.0795 5 5V5.83331H15V5C15 4.0795 14.2538 3.33331 13.3333 3.33331Z" />
                        </svg>
                      </div>
                    </div>
                  </div>
                </div>
                <!-- CRM Metrics -->

                <!-- ====== Chart One Start -->
                <include src="./partials/chart/chart-01.html" />
                <!-- ====== Chart One End -->
              </div>


              <div class="col-span-12">
                <!-- ====== Chart Three Start -->
                <include src="./partials/chart/chart-03.html" />
                <!-- ====== Chart Three End -->
              </div>

              <div class="col-span-12 xl:col-span-5">
                <!-- ====== Map One Start -->
                <include src="./partials/map-01.html" />
                <!-- ====== Map One End -->
              </div>

              <div class="col-span-12 xl:col-span-7">
                <!-- ====== Table One Start -->
                <include src="./partials/table/table-01.html" />
                <!-- ====== Table One End -->
              </div>
            </div>
          </div>
        </main>
        <!-- ===== Main Content End ===== -->
      </div>
      <!-- ===== Content Area End ===== -->
    </div>
    <!-- ===== Page Wrapper End ===== -->
    <script type="module">
      import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
      import { app } from "./firebaseConfig.js";

      const db = getFirestore(app);

      async function loadMetrics() {
        const agentsSnapshot = await getDocs(collection(db, "agents"));
        document.getElementById('totalAgents').textContent = agentsSnapshot.size;

        const prospectsSnapshot = await getDocs(collection(db, "prospects"));
        document.getElementById('totalProspects').textContent = prospectsSnapshot.size;

        const clientsSnapshot = await getDocs(collection(db, "clients"));
        document.getElementById('totalClients').textContent = clientsSnapshot.size;

        const salesSnapshot = await getDocs(collection(db, "sales"));
        document.getElementById('totalSales').textContent = salesSnapshot.size;
      }

      loadMetrics();
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => console.log('SW registered'));
      }
    </script>
  </body>
</html>
